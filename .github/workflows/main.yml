name: Flutter CI/CD to Google Drive

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Standard Checkout (Don't use 'path' or 'defaults' here)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 4. Run Flutter commands by "CD-ing" into the folder first
      - name: Install & Analyze
        run: |
          cd app/cropz_app
          flutter pub get
          flutter doctor
          flutter analyze
          flutter build apk --release

      # 5. Extract Version (Explicit path)
      - name: Get Version from pubspec
        run: |
          VERSION=$(grep 'version: ' app/cropz_app/pubspec.yaml | sed 's/version: //')
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      # 6. Upload to Google Drive (Full path from root)
      - name: Upload APK to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
          filename: app/cropz_app/build/app/outputs/flutter-apk/app-release.apk
          name: app-v${{ env.APP_VERSION }}-b${{ github.run_number }}.apk
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          overwrite: "false"